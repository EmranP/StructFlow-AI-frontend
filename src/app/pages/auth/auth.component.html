<div class="auth-page">
  <div class="auth-bg">
    <div class="grid-overlay"></div>
  </div>

  <div class="auth-card animate-fade-up">
    <div class="auth-header">
      <div class="logo-wrap">
        <span class="logo-big">⬡</span>
      </div>
      <h1>StructFlow</h1>
      <p>AI-powered project structure generator</p>
    </div>

    <div class="tab-switcher">
      <button [class.active]="mode === 'login'" (click)="mode = 'login'; error = ''">Sign In</button>
      <button [class.active]="mode === 'register'" (click)="mode = 'register'; error = ''">Sign Up</button>
      <div class="tab-indicator" [class.right]="mode === 'register'"></div>
    </div>

    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" (keyup.enter)="submit()"/>
    </div>

    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="submit()"/>
    </div>

    <div class="error-msg" *ngIf="error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <button class="btn btn-primary submit-btn" (click)="submit()" [disabled]="loading">
      <span *ngIf="!loading">{{ mode === 'login' ? 'Sign In' : 'Create Account' }}</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <p class="auth-footer">
      {{ mode === 'login' ? "Don't have an account?" : 'Already have an account?' }}
      <button class="link-btn" (click)="toggle()">{{ mode === 'login' ? 'Sign Up' : 'Sign In' }}</button>
    </p>
  </div>
</div>
